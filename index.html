<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sneha ❤️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd9e6,#fff2f6);
  overflow:hidden;
  text-align:center;
  padding:20px;
}

.container{
  z-index:2;
  max-width:750px;
  transition:all .8s ease;
}

h1{
  font-size:2.8rem;
  color:#ff4f81;
  margin-bottom:20px;
  animation:fadeIn 1.5s ease;
}

.text{
  font-size:1.1rem;
  line-height:1.9;
  color:#555;
  animation:fadeIn 1.5s ease;
  transition:opacity .8s ease;
}

button{
  margin-top:30px;
  padding:14px 30px;
  border:none;
  background:#ff4f81;
  color:white;
  font-size:1rem;
  border-radius:40px;
  cursor:pointer;
  transition:.3s ease;
  box-shadow:0 4px 15px rgba(255,79,129,.2);
}

button:hover{
  transform:scale(1.07);
}

.fade-out{
  opacity:0;
}

.heart{
  position:absolute;
  animation:float 7s linear infinite;
  opacity:.8;
}

@keyframes float{
  0%{
    transform:translateY(100vh);
    opacity:1;
  }
  100%{
    transform:translateY(-10vh);
    opacity:0;
  }
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1 id="title">Happy Birthday Sneha ❤️</h1>

<p class="text" id="content">
Some people enter your life quietly…  
yet somehow become the reason ordinary moments feel a little more special ✨
</p>

<button id="actionBtn" onclick="nextStep()">Tap To Begin The Surprise 🎵✨</button>

</div>

<script>
let step = 1;

function changeContent(newTitle,newText,newButton){

document.getElementById("title").classList.add("fade-out");
document.getElementById("content").classList.add("fade-out");
document.getElementById("actionBtn").classList.add("fade-out");

setTimeout(()=>{

document.getElementById("title").innerHTML = newTitle;
document.getElementById("content").innerHTML = newText;
document.getElementById("actionBtn").innerHTML = newButton;

document.getElementById("title").classList.remove("fade-out");
document.getElementById("content").classList.remove("fade-out");
document.getElementById("actionBtn").classList.remove("fade-out");

},800);
}

function nextStep(){
document.getElementById("bgMusic").play();
if(step===1){

changeContent(
"For You 🌙",
`I don’t know if you realize this…<br><br>

but your smile has this beautiful way of making everything feel lighter.<br>

There is something about your presence that stays in my mind longer than it should ❤️<br><br>

And today… I just hope your day feels as beautiful as you make others feel.`,

"A Little Secret 🌙"
);

step=2;
}

else if(step===2){

changeContent(
"A Little Secret 🌙",

`Birthdays are special… but somehow today feels special to me too.<br><br>

Maybe because the person reading this has quietly become someone I look forward to thinking about.<br><br>

Some people leave impressions…<br>
you somehow became a feeling I never expected.<br><br>

And maybe… some feelings are beautiful<br>
even when left unspoken.<br><br>

Happy Birthday Sneha ❤️✨`,

""
);

document.getElementById("actionBtn").style.display="none";

step=3;
}
}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*18+12)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);
}

setInterval(createHeart,450);
</script>

</body>
</html>
